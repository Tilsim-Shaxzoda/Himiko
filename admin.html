<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Himiko — Admin Panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-text">HIMIKO</span>
      <span class="logo-badge">Admin</span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-btn active" onclick="showTab('tasks', this)">
        <i class="fa-solid fa-list-check"></i> Tasklarni boshqarish
      </button>
      <button class="nav-btn" onclick="showTab('users', this)">
        <i class="fa-solid fa-users"></i> Foydalanuvchilar
      </button>
    </nav>
    <button class="sidebar-logout" onclick="adminLogout()">
      <i class="fa-solid fa-right-from-bracket"></i> Chiqish
    </button>
  </aside>

  <div class="admin-main">

    <section id="tab-tasks" class="tab-content active">
      <div class="page-header">
        <h1>Tasklarni boshqarish</h1>
        <button class="btn-primary" onclick="openTaskModal()">
          <i class="fa-solid fa-plus"></i> Yangi task
        </button>
      </div>
      <div id="taskList" class="task-grid"></div>
    </section>

    <section id="tab-users" class="tab-content">
      <div class="page-header">
        <h1>Foydalanuvchilar</h1>
        <button class="btn-secondary" onclick="loadUsers()">
          <i class="fa-solid fa-rotate"></i> Yangilash
        </button>
      </div>
      <div class="table-wrapper">
        <table class="users-table">
          <thead>
            <tr>
              <th>Foydalanuvchi</th>
              <th>Joriy bosqich</th>
              <th>Bajarilgan</th>
              <th>Yordamlar</th>
              <th>Songi faollik</th>
              <th>Holat</th>
              <th>Amallar</th>
            </tr>
          </thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </div>
    </section>

  </div>

  <!-- TASK MODAL -->
  <div id="taskModal" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modalTitle">Yangi Task</h2>
        <button class="modal-close" onclick="closeTaskModal()">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="modal-body">

        <div class="form-row">
          <label>Task sarlavhasi</label>
          <input type="text" id="f_title" placeholder="1-Topshiriq" />
        </div>

        <div class="form-row">
          <label>Savol matni</label>
          <textarea id="f_question" rows="3" placeholder="Foydalanuvchiga korsatiladigan topshiriq matni..."></textarea>
        </div>

        <div class="form-row">
          <label>Togri javob</label>
          <input type="text" id="f_answer" placeholder="togri_javob" />
        </div>

        <div class="form-row two-col">
          <div>
            <label>Taymer (soat)</label>
            <input type="number" id="f_timer" value="172" min="1" />
          </div>
          <div>
            <label>Yordam soni</label>
            <input type="number" id="f_maxHints" value="3" min="0" max="10" />
          </div>
        </div>

        <div class="form-row">
    0      <label>Yordam matnlari (har biri alohida qatorda)</label>
          <textarea id="f_hints" rows="3" placeholder="1-yordam matni&#10;2-yordam matni&#10;3-yordam matni"></textarea>
        </div>

        <!-- VIDEO — fayl yuklash yoki URL -->
        <div class="form-row">
          <label><i class="fa-solid fa-video"></i> Video korsatma (ixtiyoriy)</label>
          <div class="file-upload-box" onclick="document.getElementById('f_video_file').click()">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <span id="videoFileName">Video faylni tanlang (mp4, webm)</span>
          </div>
          <input type="file" id="f_video_file" accept="video/*" style="display:none" onchange="handleVideoUpload(this)" />
          <div id="videoPreviewWrap" style="display:none; margin-top:8px;">
            <video id="videoPreview" controls style="width:100%;border-radius:12px;max-height:160px;background:#000;"></video>
            <button class="btn-remove-file" onclick="removeVideo()">
              <i class="fa-solid fa-xmark"></i> Videoni olib tashlash
            </button>
          </div>
          <input type="text" id="f_video" placeholder="yoki video URL kiriting (https://...)" style="margin-top:8px;" />
        </div>

        <!-- RESURSLAR — fayl yuklash -->
        <div class="form-row">
          <label><i class="fa-solid fa-paperclip"></i> Resurslar (foydalanuvchi yuklab oladi)</label>
          <div id="resourceInputs"></div>
          <button class="btn-add-resource" onclick="addResourceInput()">
            <i class="fa-solid fa-plus"></i> Resurs qoshish
          </button>
        </div>

      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeTaskModal()">Bekor qilish</button>
        <button class="btn-primary" onclick="saveTask()">
          <i class="fa-solid fa-floppy-disk"></i> Saqlash
        </button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="admin.js"></script>
</body>
</html>
